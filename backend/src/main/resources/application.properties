# Server
server.port=${PORT:8080}

# DataSource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/flatmate_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT  (Base64-encoded secret, min 256 bits)
jwt.secret=${JWT_SECRET:ZmxhdG1hdGVTZWNyZXRLZXlGb3JKV1RBdXRoZW50aWNhdGlvbjIwMjQhQA==}
jwt.expiration=86400000
